<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faculty Reviews</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
    <style>
        body { background:#f8fafc; color:#0f172a; }
        .container{max-width:1180px;margin:0 auto;padding:16px 16px 40px}
        .header{
            display:flex;align-items:center;justify-content:space-between;gap:16px;
            margin:0 0 18px;padding:14px 18px;border-radius:20px;
            background:rgba(255,255,255,0.9);backdrop-filter:blur(12px);
            border:1px solid #e2e8f0;box-shadow:0 10px 30px rgba(15,23,42,0.06);
            position:sticky;top:12px;z-index:50
        }
        .title{font-size:1.7rem;font-weight:800;letter-spacing:-0.03em;line-height:1.15}
        .subtitle{color:#64748b;font-size:0.95rem;margin-top:4px}
        .search{max-width:640px;margin:0 auto 14px;position:relative}
        .search input{width:100%;padding:12px 16px;border-radius:9999px;border:1px solid #dbe3ee;background:#fff;box-shadow:0 2px 10px rgba(15,23,42,0.04)}
        .filters-bar{
            position:sticky;top:86px;z-index:40;padding:12px 14px;margin-bottom:18px;
            border-radius:18px;background:rgba(255,255,255,0.86);backdrop-filter:blur(12px);
            border:1px solid #e2e8f0;box-shadow:0 10px 24px rgba(15,23,42,0.05)
        }
        .pills{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:0}
        .pill{padding:7px 12px;border-radius:9999px;background:#fff;border:1px solid #dbe3ee;color:#334155;cursor:pointer;font-size:0.85rem;font-weight:600}
        .pill.active{background:#1d4ed8;color:#fff;box-shadow:0 8px 18px rgba(29,78,216,0.14);border-color:#1d4ed8}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:18px;margin-top:18px}
        .card{background:#fff;padding:18px;border-radius:18px;display:flex;align-items:center;justify-content:space-between;border:1px solid #e2e8f0;box-shadow:0 2px 12px rgba(15,23,42,0.04);transition:transform .18s ease, box-shadow .18s ease}
        .card:hover{box-shadow:0 14px 30px rgba(15,23,42,0.08);transform:translateY(-2px)}
        .info h3{font-size:1.08rem;margin:0 0 6px;color:#0f172a;letter-spacing:-0.01em}
        .tag{display:inline-flex;align-items:center;padding:5px 10px;background:#eff6ff;color:#1d4ed8;border-radius:999px;font-weight:700;font-size:0.75rem}
        .meta{color:#64748b;font-size:0.9rem}
        .avatar{width:88px;height:88px;border-radius:9999px;overflow:hidden;border:4px solid #fff;background:#fff;box-shadow:0 4px 16px rgba(15,23,42,0.08)}
        .center{text-align:center;margin-top:8px}
        .profile{position:relative}
        .profile-menu{position:absolute;right:0;top:44px;background:#fff;border:1px solid #e6eef8;border-radius:12px;padding:8px;box-shadow:0 10px 24px rgba(2,6,23,0.08);display:none;min-width:160px}
        .profile:hover .profile-menu{display:block}
        .profile a{display:block;padding:8px 10px;color:#0f172a;text-decoration:none;border-radius:8px;font-size:0.92rem}
        .profile a:hover{background:#f1f5f9}
        .profile-menu form{margin:0}
        .profile-menu .menu-btn{display:block;width:100%;text-align:left;padding:8px 10px;background:none;border:none;color:#0f172a;cursor:pointer;border-radius:8px;font-size:0.92rem}
        .profile-menu .menu-btn:hover{background:#f1f5f9}
        .header .btn{width:auto;min-height:36px;padding:0.55rem 0.9rem;font-size:0.88rem}
        @media (max-width: 720px){
            .header{flex-direction:column;align-items:flex-start;position:static}
            .filters-bar{top:0;position:static}
            .grid{grid-template-columns:1fr}
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <div class="title">FAST NUCES <span style="color:#1d4ed8">Faculty Reviews</span></div>
            <div class="subtitle">Find and review your instructors to help others.</div>
        </div>
        <div>
            <div class="profile">
                <div th:if="${currentUser != null}">
                    <button style="background:#fff;border-radius:9999px;padding:8px;border:1px solid #e6eef8;cursor:pointer">
                        <img th:src="@{/images/nuces.jpg}" alt="profile" style="width:28px;height:28px;border-radius:9999px;vertical-align:middle" />
                    </button>
                    <div class="profile-menu">
                        <a th:href="@{/profile}">Profile</a>
                        <a th:href="@{/settings}">Settings</a>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="menu-btn">Logout</button>
                        </form>
                    </div>
                </div>
                <div th:if="${currentUser == null}">
                    <a th:href="@{/login}" class="btn btn-primary" style="text-decoration:none;">Login / Sign Up</a>
                </div>
            </div>
        </div>
    </div>

    <form th:action="@{/}" method="get" class="filters-bar">
        <div class="search">
            <input type="text" name="q" placeholder="Search for a professor..." th:value="${q}" />
        </div>

        <div class="pills">
            <button type="submit" name="dept" value="All" th:classappend="${dept=='All'}? ' pill active' : ' pill'" class="pill">All</button>
            <button type="submit" name="dept" value="CS" th:classappend="${dept=='CS'}? ' pill active' : ' pill'" class="pill">CS</button>
            <button type="submit" name="dept" value="AI &amp; DS" th:classappend="${dept=='AI & DS'}? ' pill active' : ' pill'" class="pill">AI &amp; DS</button>
            <button type="submit" name="dept" value="SE" th:classappend="${dept=='SE'}? ' pill active' : ' pill'" class="pill">SE</button>
            <button type="submit" name="dept" value="Cyber Security" th:classappend="${dept=='Cyber Security'}? ' pill active' : ' pill'" class="pill">Cyber Security</button>
            <button type="submit" name="dept" value="Science And Humanities" th:classappend="${dept=='Science And Humanities'}? ' pill active' : ' pill'" class="pill">Science And Humanities</button>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(faculty)}" class="center">
        <p class="meta">No faculty found matching "<span th:text="${q}"></span>" in <span th:text="${dept}"></span>.</p>
        <a href="/" style="color:#1d4ed8;margin-top:10px;display:inline-block">Clear filters</a>
    </div>

    <div class="grid" id="faculty-grid">
        <a th:each="f : ${faculty}" th:href="@{/faculty/{id}(id=${f.id})}" style="text-decoration:none;color:inherit">
            <div class="card">
                <div class="info">
                    <h3 th:text="${f.name}">Prof Name</h3>
                    <div class="tag" th:text="${f.department}">CS</div>
                    <div class="meta" style="margin-top:8px"
                         th:if="${reviewCountByFacultyId[f.id] != null and reviewCountByFacultyId[f.id] > 0}"
                         th:text="${averageRatingByFacultyId[f.id] + '★ • ' + reviewCountByFacultyId[f.id] + ' Reviews'}">
                    </div>
                    <div class="meta" style="margin-top:8px"
                         th:if="${reviewCountByFacultyId[f.id] == null or reviewCountByFacultyId[f.id] == 0}">
                        New • 0 Reviews
                    </div>
                </div>
                <div class="avatar">
                    <img th:if="${f.imageUrl}" th:src="${f.imageUrl}" th:alt="${f.name}" style="width:100%;height:100%;object-fit:cover"/>
                    <div th:if="${f.imageUrl==null}" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;color:#cbd5e1">👤</div>
                </div>
            </div>
        </a>
    </div>

</div>
</body>
</html>
