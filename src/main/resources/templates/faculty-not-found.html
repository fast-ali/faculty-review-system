<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faculty Not Found</title>
    <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div class="container" style="max-width:800px;margin:40px auto;text-align:center">
    <h1 style="font-size:28px;margin-bottom:12px">Faculty Not Found</h1>
    <p style="color:#64748b">We couldn't find a faculty member with the requested ID: <strong th:text="${missingId}"></strong></p>
    <p style="margin-top:16px"><a th:href="@{/}" style="color:#2563eb">← Back to Faculty List</a></p>
</div>
</body>
</html>
