spring.application.name=BMS
# Load optional local environment overrides (ignored if missing)
spring.config.import=optional:file:.env[.properties]

# 1. Connection Details (PostgreSQL default profile)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/BMS_dev}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:admin123}

# 2. Driver Class
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. Hibernate / JPA Strategy
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# 4. Flyway migrations (schema source of truth)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
